<style>
  :root {
    --paper: #F5F1E6;
    --ink: #1E2A3A;
    --ink-soft: #5B6470;
    --ink-faint: #8B8F94;
    --rule: #D9D0BC;
    --brass: #A57F2E;
    --green-hi: #1a5c35;
    --green-lo: #cceedd;
    --shadow: 0 1px 2px rgba(30,42,58,0.08), 0 4px 14px rgba(30,42,58,0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #e8e4da;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────────────── */
  .top-bar {
    flex-shrink: 0;
    background: var(--paper);
    border-bottom: 2px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 1000;
  }
  .top-bar .title {
    font-family: 'Spectral', serif;
    font-weight: 600;
    font-size: 1.35rem;
    color: var(--ink);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .top-bar .title .dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--green-hi);
  }
  .top-bar .sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.73rem;
    color: var(--ink-soft);
  }
  .back-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-soft);
    text-decoration: none;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 5px 12px;
    background: var(--paper);
    transition: border-color 0.15s, color 0.15s;
  }
  .back-link:hover { border-color: var(--ink); color: var(--ink); }

  /* ── Controls bar ────────────────────────────────────────── */
  .controls-bar {
    flex-shrink: 0;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 7px 20px;
    flex-wrap: wrap;
    z-index: 999;
  }
  .controls-bar label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.73rem;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .controls-bar input[type=range] {
    width: 100px;
    accent-color: var(--green-hi);
  }
  .controls-bar .val-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.73rem;
    color: var(--ink);
    font-weight: 600;
    min-width: 30px;
  }
  .signal-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-faint);
    margin-left: auto;
  }

  /* ── Map ─────────────────────────────────────────────────── */
  #map {
    flex: 1;
    min-height: 0;
  }

  /* ── Legend ──────────────────────────────────────────────── */
  .legend {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.70rem;
    color: var(--ink-soft);
    min-width: 150px;
    box-shadow: var(--shadow);
  }
  .legend .legend-title {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 7px;
    font-size: 0.72rem;
  }
  .legend-bar {
    height: 10px;
    border-radius: 3px;
    background: linear-gradient(to right, #d8f0e6, #1a5c35);
    margin-bottom: 4px;
  }
  .legend-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.63rem;
    color: var(--ink-faint);
  }
  .legend-dim { margin-top: 8px; display: flex; align-items: center; gap: 6px; }
  .legend-dim .swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    background: #ccc;
    flex-shrink: 0;
  }

  /* ── Loading overlay ─────────────────────────────────────── */
  #loading {
    position: absolute;
    inset: 0;
    background: rgba(245,241,230,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--ink-soft);
    gap: 10px;
    pointer-events: none;
  }
  #loading.hidden { display: none; }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--rule);
    border-top-color: var(--green-hi);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Popup ───────────────────────────────────────────────── */
  .zip-popup { font-family: 'Inter', sans-serif; font-size: 0.82rem; color: var(--ink); min-width: 200px; }
  .zip-popup .zp-zip { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 600; margin-bottom: 2px; }
  .zip-popup .zp-city { color: var(--ink-soft); font-size: 0.78rem; margin-bottom: 10px; }
  .zip-popup .zp-score {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    background: #e8f5ee;
    color: #1a5c35;
    border: 1px solid #aad9be;
    border-radius: 4px;
    padding: 2px 8px;
    margin-bottom: 6px;
  }
  .zip-popup .zp-ev { color: var(--ink-soft); font-size: 0.77rem; margin-bottom: 10px; }
  .zip-popup .zp-link a {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: #1a5c35;
    text-decoration: none;
    border: 1px solid #aad9be;
    border-radius: 4px;
    padding: 4px 10px;
    display: inline-block;
  }
  .zip-popup .zp-link a:hover { background: #e8f5ee; }

  @media (max-width: 600px) {
    .signal-note { display: none; }
    .top-bar .title { font-size: 1.1rem; }
  }

<div class="top-bar">

  <div style="display:flex;gap:8px;align-items:center">

// ── Map setup ─────────────────────────────────────────────────
const map = L.map('map', {
  preferCanvas: true,
  zoomControl: true,
  minZoom: 9,
  maxZoom: 17,
}).setView([40.79, -73.55], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 20,
}).addTo(map);

// ── Color scale ───────────────────────────────────────────────
function scoreColor(score) {
  if (score === undefined || score === null) return '#cccccc';
  if (score === 0) return '#ddeedd';  // near-zero: very pale
  // Interpolate lightness from 80% (score=1) down to 20% (score=100)
  const t = score / 100;
  const lightness = Math.round(80 - t * 58);
  const saturation = Math.round(40 + t * 30);
  return `hsl(145, ${saturation}%, ${lightness}%)`;
}

function zipStyle(zip, minScore) {
  const score = EV_SCORES[zip] ?? null;
  const hidden = score === null || score < minScore;
  return {
    fillColor: hidden ? '#e0ddd8' : scoreColor(score),
    fillOpacity: hidden ? 0.25 : 0.72,
    color: '#9aaa99',
    weight: 0.8,
    opacity: hidden ? 0.3 : 0.7,
  };
}

// ── State ─────────────────────────────────────────────────────
let geoLayer = null;
let minScore = 0;

function refreshStyles() {
  if (!geoLayer) return;
  geoLayer.eachLayer(layer => {
    const zip = layer.feature.properties.zip;
    layer.setStyle(zipStyle(zip, minScore));
  });
}

// ── Legend ────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <div class="legend-title">Env Zone Score</div>
    <div class="legend-bar"></div>
    <div class="legend-labels"><span>0</span><span>50</span><span>100</span></div>
    <div class="legend-dim">
      <div class="swatch"></div>
      <span>Below min / no data</span>
    </div>
    <div style="margin-top:8px;font-size:0.63rem;color:var(--ink-faint);line-height:1.4">
      Based on EV registrations<br>per zip (NY Open Data)
    </div>
  `;
  return div;
};
legend.addTo(map);

// ── Controls ──────────────────────────────────────────────────
const slider = document.getElementById('minScore');
const sliderVal = document.getElementById('minScoreVal');

slider.addEventListener('input', () => {
  minScore = parseInt(slider.value, 10);
  sliderVal.textContent = minScore === 0 ? 'any' : `${minScore}+`;
  refreshStyles();
});

// ── Popup builder ─────────────────────────────────────────────
function makePopup(zip) {
  const score = EV_SCORES[zip] ?? null;
  const count = EV_COUNTS[zip] ?? null;
  const city = ZIP_CITIES[zip] || '';
  const canvassUrl = `voter_lookup.html?zip=${zip}`;

  const scoreBadge = score !== null
    ? `<div class="zp-score">Env Zone ${score}/100</div>`
    : `<div class="zp-score" style="background:#f5f5f5;color:#888;border-color:#ddd">No EV data</div>`;

  const evLine = count !== null
    ? `<div class="zp-ev">${count.toLocaleString()} EV${count === 1 ? '' : 's'} registered</div>`
    : '';

  return `<div class="zip-popup">
    <div class="zp-zip">${zip}</div>
    <div class="zp-city">${city}</div>
    ${scoreBadge}
    ${evLine}
    <div class="zp-link"><a href="${canvassUrl}">Search this zip in Canvass Tool →</a></div>
  </div>`;
}

// ── Load GeoJSON ──────────────────────────────────────────────
fetch('nassau_suffolk_zips.geojson')
  .then(r => r.json())
  .then(geo => {
    geoLayer = L.geoJSON(geo, {
      style: feat => zipStyle(feat.properties.zip, minScore),
      onEachFeature: (feat, layer) => {
        const zip = feat.properties.zip;
        layer.on('click', () => {
          layer.bindPopup(makePopup(zip), { maxWidth: 280 }).openPopup();
        });
        layer.on('mouseover', function() {
          if ((EV_SCORES[zip] ?? 0) >= minScore) {
            this.setStyle({ weight: 2, color: '#1a5c35', fillOpacity: 0.85 });
          }
        });
        layer.on('mouseout', function() {
          geoLayer.resetStyle(this);
          // Re-apply min-score dimming after reset
          this.setStyle(zipStyle(zip, minScore));
        });
      },
    }).addTo(map);

    document.getElementById('loading').classList.add('hidden');
  })
  .catch(err => {
    const el = document.getElementById('loading');
    el.innerHTML = `<span style="color:#c0392b">Failed to load boundary data: ${err.message}</span>`;
  });
</script>
